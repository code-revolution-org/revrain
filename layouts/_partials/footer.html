<footer class="site-footer">
  <div class="footer-content">
    <!-- Copyright / 版权声明 -->
    <p class="copyright">© {{ now.Year }} revrain Theme · Built with Hugo.</p>
    <!-- Footer links / 页脚链接 -->
    <nav class="footer-links">
      {{ with .Site.Params.footer.github }}
        <a href="{{ . }}" target="_blank" rel="noopener">GitHub</a>
      {{ end }}
      {{ with .Site.Params.footer.rss }}
        <a href="{{ relURL . }}" target="_blank" rel="noopener">RSS</a>
      {{ end }}
      {{ range .Site.Params.footer.links }}
        <a href="{{ if hasPrefix .url "http" }}{{ .url }}{{ else }}{{ relURL .url }}{{ end }}" target="_blank" rel="noopener">{{ .name }}</a>
      {{ end }}
    </nav>
  </div>
</footer>
